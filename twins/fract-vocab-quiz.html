<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root Words: Fract, Frag, Frail</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0f4f8;
    color: #2d3748;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .container { max-width: 600px; width: 100%; }
  h1 { text-align: center; font-size: 1.6rem; margin-bottom: 6px; color: #1a365d; }
  .subtitle { text-align: center; color: #718096; font-size: 0.95rem; margin-bottom: 24px; }
  .progress-bar { background: #e2e8f0; border-radius: 999px; height: 10px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; border-radius: 999px; transition: width 0.4s ease; }
  .score-line { display: flex; justify-content: space-between; font-size: 0.9rem; color: #4a5568; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 16px; padding: 28px 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .q-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #a0aec0; margin-bottom: 8px; }
  .q-text { font-size: 1.15rem; line-height: 1.5; color: #2d3748; margin-bottom: 24px; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    display: block; width: 100%; padding: 14px 18px; font-size: 1.05rem;
    border: 2px solid #e2e8f0; border-radius: 12px; background: #fff;
    color: #2d3748; cursor: pointer; text-align: left; transition: all 0.15s ease;
  }
  .choice-btn:hover:not(:disabled) { border-color: #667eea; background: #f7f8ff; }
  .choice-btn:disabled { cursor: default; }
  .choice-btn.correct { border-color: #38a169; background: #f0fff4; color: #22543d; font-weight: 600; }
  .choice-btn.wrong { border-color: #e53e3e; background: #fff5f5; color: #9b2c2c; }
  .choice-btn.reveal { border-color: #38a169; background: #f0fff4; color: #22543d; }
  .feedback { text-align: center; font-size: 1.1rem; font-weight: 600; margin-top: 18px; min-height: 28px; }
  .feedback.correct-fb { color: #38a169; }
  .feedback.wrong-fb { color: #e53e3e; }
  .explain-box {
    margin-top: 14px; padding: 14px 16px; border-radius: 10px;
    font-size: 0.95rem; line-height: 1.5;
  }
  .explain-box.wrong-ex { background: #fff5f5; border-left: 4px solid #e53e3e; color: #742a2a; }
  .explain-box.correct-ex { background: #f0fff4; border-left: 4px solid #38a169; color: #22543d; }
  .explain-box strong { font-weight: 700; }
  .next-btn {
    display: block; margin: 16px auto 0; padding: 12px 32px; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; cursor: pointer; transition: opacity 0.2s;
  }
  .next-btn:hover { opacity: 0.9; }
  .results { text-align: center; }
  .results .score-big { font-size: 3.5rem; font-weight: 700; color: #667eea; margin: 12px 0 4px; }
  .results .score-label { font-size: 1.1rem; color: #718096; margin-bottom: 20px; }
  .results .message { font-size: 1.15rem; margin-bottom: 24px; line-height: 1.5; }
  .missed-list { text-align: left; margin: 0 auto 24px; max-width: 480px; }
  .missed-list h3 { font-size: 1rem; color: #e53e3e; margin-bottom: 10px; }
  .missed-item { padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; line-height: 1.4; }
  .missed-item strong { color: #2d3748; }
  .missed-item .mi-explain { color: #718096; font-size: 0.88rem; margin-top: 4px; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-row button { padding: 12px 28px; font-size: 1rem; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s; }
  .btn-row button:hover { opacity: 0.85; }
  .btn-retry-missed { background: #e53e3e; color: #fff; }
  .btn-restart { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-home { background: #4a5568; color: #fff; }

  /* Menu */
  .menu-cards { display: flex; flex-direction: column; gap: 14px; margin-top: 8px; }
  .menu-card {
    background: #fff; border-radius: 14px; padding: 22px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    cursor: pointer; border: 2px solid transparent; transition: all 0.15s ease;
  }
  .menu-card:hover { border-color: #667eea; transform: translateY(-2px); box-shadow: 0 4px 18px rgba(0,0,0,0.12); }
  .menu-card h2 { font-size: 1.15rem; color: #1a365d; margin-bottom: 4px; }
  .menu-card p { font-size: 0.9rem; color: #718096; line-height: 1.4; }
  .menu-card .badge { display: inline-block; background: #667eea; color: #fff; font-size: 0.75rem; font-weight: 600; padding: 2px 10px; border-radius: 999px; margin-bottom: 8px; }

  /* Flashcard */
  .fc-scene { perspective: 800px; margin: 0 auto 16px; max-width: 440px; }
  .fc-card {
    width: 100%; min-height: 220px; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s ease;
    cursor: pointer;
  }
  .fc-card.flipped { transform: rotateY(180deg); }
  .fc-face {
    position: absolute; width: 100%; min-height: 220px; backface-visibility: hidden;
    border-radius: 16px; padding: 28px 24px; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .fc-front {
    background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
  }
  .fc-front .fc-word { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .fc-front .fc-hint { font-size: 0.85rem; opacity: 0.7; }
  .fc-back {
    background: #fff; color: #2d3748; transform: rotateY(180deg);
  }
  .fc-back .fc-def { font-size: 1.15rem; line-height: 1.6; margin-bottom: 12px; }
  .fc-back .fc-explain { font-size: 0.88rem; color: #718096; line-height: 1.5; border-top: 1px solid #e2e8f0; padding-top: 12px; }
  .fc-counter { text-align: center; font-size: 0.9rem; color: #718096; margin-bottom: 12px; }
  .fc-grade { display: flex; gap: 12px; justify-content: center; margin-top: 4px; }
  .fc-grade button {
    padding: 12px 24px; font-size: 1rem; font-weight: 600; border: none;
    border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
  }
  .fc-grade button:hover { opacity: 0.85; }
  .fc-got-it { background: #38a169; color: #fff; }
  .fc-learning { background: #ed8936; color: #fff; }
  .fc-nav { display: flex; gap: 12px; justify-content: center; margin-bottom: 12px; }
  .fc-nav button {
    padding: 8px 20px; font-size: 0.95rem; font-weight: 600; border: 2px solid #e2e8f0;
    border-radius: 10px; background: #fff; color: #4a5568; cursor: pointer;
    transition: all 0.15s;
  }
  .fc-nav button:hover { border-color: #667eea; color: #667eea; }
  .fc-nav button:disabled { opacity: 0.3; cursor: default; }
  .fc-summary { text-align: center; }
  .fc-summary .big-check { font-size: 3rem; margin-bottom: 8px; }
  .fc-summary .fc-msg { font-size: 1.15rem; margin-bottom: 20px; line-height: 1.5; color: #2d3748; }
  .fc-still { text-align: left; margin: 0 auto 20px; max-width: 400px; }
  .fc-still h3 { font-size: 1rem; color: #ed8936; margin-bottom: 10px; }
  .fc-still-item { padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
  .fc-still-item strong { color: #2d3748; }
  .fc-still-item span { color: #718096; }
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
/* ── VOCAB DATA (frail, fract, frag = break; shatter) ── */
const VOCAB = [
  {
    word: "fractals", pos: "n",
    def: "The type of geometry that creates broken patterns of a smaller version of a design",
    explain: "\"Fractals\" comes from the Latin \"fractus\" meaning broken. Think of a snowflake or a fern leaf \u2014 zoom in and you see the same pattern repeated at smaller and smaller scales. The shapes look like they\u2019re \"broken\" into tiny copies of themselves."
  },
  {
    word: "fraction", pos: "n",
    def: "A part of a whole; a broken piece of something that is no longer whole",
    explain: "When you see 3/4, you\u2019re looking at something that\u2019s been \"broken\" into 4 pieces and you have 3 of them. The word literally means \"a breaking\" \u2014 a fraction is what you get when you break a whole into parts."
  },
  {
    word: "fracture", pos: "n",
    def: "A break in a part of the body",
    explain: "Doctors use \"fracture\" instead of \"break\" when talking about bones, but it means the same thing! A stress fracture is a tiny crack, while a compound fracture is when the bone breaks through the skin. The root \"fract\" = break."
  },
  {
    word: "fragile", pos: "adj",
    def: "So delicate that it could break easily; easily damaged",
    explain: "\"Fragile\" comes from the Latin \"fragilis\" meaning \"easily broken.\" That\u2019s why you see FRAGILE stamped on shipping boxes containing glass or electronics \u2014 it\u2019s a warning that what\u2019s inside could shatter. The \"frag\" root = break."
  },
  {
    word: "fragment", pos: "n",
    def: "An incomplete sentence; a break in a sentence",
    explain: "A fragment is a piece that broke off from something bigger. In writing, a sentence fragment is an incomplete thought \u2014 it\u2019s \"broken\" off from a complete sentence. \"Like this.\" \u2190 That\u2019s a fragment! The \"frag\" root means break."
  },
  {
    word: "fragmented", pos: "adj",
    def: "Describes something that is broken into pieces",
    explain: "When your computer says a hard drive is \"fragmented,\" it means files are broken into pieces scattered around the disk. In everyday life, a fragmented story is one told in disconnected pieces rather than in order."
  },
  {
    word: "frail", pos: "adj",
    def: "Being easily broken or destroyed",
    explain: "\"Frail\" evolved from the Latin \"fragilis\" (same root as fragile!) through Old French. While \"fragile\" usually describes objects, \"frail\" often describes people \u2014 like someone who is physically weak and could easily be hurt."
  },
  {
    word: "infraction", pos: "n",
    def: "A broken rule; a violation",
    explain: "\"Infraction\" literally means \"a breaking\" \u2014 specifically, breaking a rule or law. A traffic infraction is when you break a driving law like speeding. The prefix \"in-\" (into) + \"fract\" (break) = breaking into/against a rule."
  },
  {
    word: "refract", pos: "v",
    def: "To bend light so that it looks like it is broken",
    explain: "Put a straw in a glass of water and it looks bent or \"broken\" \u2014 that\u2019s refraction! Light changes direction when it passes from one material to another (like air to water). \"Re-\" (back) + \"fract\" (break) = to break back/bend."
  },
  {
    word: "suffrage", pos: "v",
    def: "To break into an issue to vote",
    explain: "The suffrage movement fought for the right to vote \u2014 they had to \"break through\" barriers to participate in democracy. The 19th Amendment (1920) granted women\u2019s suffrage in the United States after decades of campaigning."
  }
];

/* ── HELPERS ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickWordChoices(correctWord, count) {
  count = count || 4;
  const others = VOCAB.map(function(v) { return v.word; }).filter(function(w) { return w !== correctWord; });
  const picked = shuffle(others).slice(0, count - 1);
  picked.push(correctWord);
  return shuffle(picked);
}

function pickDefChoices(correctDef, count) {
  count = count || 4;
  const others = VOCAB.map(function(v) { return v.def; }).filter(function(d) { return d !== correctDef; });
  const picked = shuffle(others).slice(0, count - 1);
  picked.push(correctDef);
  return shuffle(picked);
}

/* ── STATE ── */
var questions, current, score, missed, answered, quizMode;

/* ── MENU ── */
function showMenu() {
  var app = document.getElementById("app");
  app.innerHTML =
    '<h1>Root Words Quiz</h1>' +
    '<p class="subtitle">frail, fract, frag = break; shatter</p>' +
    '<div class="menu-cards">' +
      '<div class="menu-card" data-mode="flashcards">' +
        '<span class="badge">Study</span>' +
        '<h2>Flashcards</h2>' +
        '<p>Tap to flip \u2014 see the word, then reveal the definition. Mark each as \u201CGot it\u201D or \u201CStill learning\u201D</p>' +
      '</div>' +
      '<div class="menu-card" data-mode="vocab">' +
        '<span class="badge">10 questions</span>' +
        '<h2>Vocabulary Quiz</h2>' +
        '<p>Read the definition and pick the correct word</p>' +
      '</div>' +
      '<div class="menu-card" data-mode="reverse">' +
        '<span class="badge">10 questions</span>' +
        '<h2>Reverse Quiz</h2>' +
        '<p>See the word and pick the correct definition</p>' +
      '</div>' +
      '<div class="menu-card" data-mode="all">' +
        '<span class="badge">20 questions</span>' +
        '<h2>Full Test</h2>' +
        '<p>All questions both ways \u2014 definitions and words combined</p>' +
      '</div>' +
    '</div>' +
    '<a class="back-link" href="./" style="display:block;text-align:center;color:#667eea;font-size:0.9rem;margin-top:12px;">Back to Study Hub</a>';

  app.querySelectorAll(".menu-card").forEach(function(card) {
    card.addEventListener("click", function() {
      quizMode = card.dataset.mode;
      if (quizMode === "flashcards") { startFlashcards(VOCAB); return; }
      var pool = [];
      if (quizMode === "vocab" || quizMode === "all") {
        pool = pool.concat(VOCAB.map(function(v) { return { type: "vocab", word: v.word, def: v.def, explain: v.explain }; }));
      }
      if (quizMode === "reverse" || quizMode === "all") {
        pool = pool.concat(VOCAB.map(function(v) { return { type: "reverse", word: v.word, def: v.def, explain: v.explain }; }));
      }
      startQuiz(pool);
    });
  });
}

/* ── QUIZ ENGINE ── */
function startQuiz(pool) {
  questions = shuffle(pool);
  current = 0;
  score = 0;
  missed = [];
  answered = false;
  renderQuestion();
}

function renderQuestion() {
  var app = document.getElementById("app");
  if (current >= questions.length) { renderResults(app); return; }

  var q = questions[current];
  var pct = Math.round((current / questions.length) * 100);
  var label, text, choicesHTML;

  if (q.type === "vocab") {
    label = "Definition";
    text = q.def;
    var opts = pickWordChoices(q.word);
    choicesHTML = opts.map(function(c) { return '<button class="choice-btn" data-val="' + esc(c) + '">' + c + '</button>'; }).join("");
  } else {
    label = "Word";
    text = '<strong>' + q.word + '</strong>';
    var opts2 = pickDefChoices(q.def);
    choicesHTML = opts2.map(function(c) { return '<button class="choice-btn" data-val="' + esc(c) + '">' + c + '</button>'; }).join("");
  }

  app.innerHTML =
    '<h1>Root Words Quiz</h1>' +
    '<p class="subtitle">frail, fract, frag = break; shatter</p>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="score-line">' +
      '<span>Question ' + (current + 1) + ' of ' + questions.length + '</span>' +
      '<span>' + score + ' correct</span>' +
    '</div>' +
    '<div class="card">' +
      '<div class="q-label">' + label + '</div>' +
      '<div class="q-text">' + text + '</div>' +
      '<div class="choices" id="choices">' + choicesHTML + '</div>' +
      '<div class="feedback" id="feedback"></div>' +
      '<div id="explainArea"></div>' +
    '</div>';

  document.querySelectorAll(".choice-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { handleAnswer(btn, q); });
  });
}

function esc(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
function unesc(s) { var d = document.createElement('div'); d.innerHTML = s; return d.textContent; }

function showExplanation(isCorrect, q) {
  var area = document.getElementById("explainArea");
  var cls = isCorrect ? "correct-ex" : "wrong-ex";
  var prefix = isCorrect ? "Nice!" : "Here\u2019s why:";
  area.innerHTML = '<div class="explain-box ' + cls + '"><strong>' + prefix + '</strong> ' + q.explain + '</div>';
}

function handleAnswer(btn, q) {
  if (answered) return;
  answered = true;
  var chosen = unesc(btn.dataset.val);
  var correctVal = q.type === "vocab" ? q.word : q.def;
  var isCorrect = chosen === correctVal;
  var fb = document.getElementById("feedback");

  document.querySelectorAll(".choice-btn").forEach(function(b) {
    b.disabled = true;
    var bVal = unesc(b.dataset.val);
    if (bVal === correctVal) b.classList.add(isCorrect ? "correct" : "reveal");
  });

  if (isCorrect) {
    btn.classList.add("correct");
    fb.textContent = "Correct!";
    fb.className = "feedback correct-fb";
    score++;
  } else {
    btn.classList.add("wrong");
    fb.textContent = "Not quite!";
    fb.className = "feedback wrong-fb";
    missed.push(questions[current]);
  }
  showExplanation(isCorrect, q);
  addNextButton();
}

function addNextButton() {
  var btn = document.createElement("button");
  btn.className = "next-btn";
  btn.textContent = current + 1 < questions.length ? "Next" : "See Results";
  btn.addEventListener("click", function() { current++; answered = false; renderQuestion(); });
  document.querySelector(".card").appendChild(btn);
}

/* ── RESULTS ── */
function renderResults(app) {
  var pct = Math.round((score / questions.length) * 100);
  var msg;
  if (pct === 100) msg = "Perfect score! You nailed every single one!";
  else if (pct >= 80) msg = "Great job! Almost there \u2014 just a few to review.";
  else if (pct >= 60) msg = "Good effort! A little more practice and you\u2019ll have it.";
  else msg = "Keep studying \u2014 you\u2019ll get there! Try the missed words again.";

  var missedHTML = "";
  if (missed.length) {
    missedHTML = '<div class="missed-list"><h3>To review (' + missed.length + ')</h3>' +
      missed.map(function(m) {
        return '<div class="missed-item"><strong>' + m.word + '</strong> \u2014 ' + m.def +
          '<div class="mi-explain">' + m.explain + '</div></div>';
      }).join("") + '</div>';
  }

  var retryBtn = missed.length
    ? '<button class="btn-retry-missed" id="retryMissed">Retry Missed (' + missed.length + ')</button>' : "";

  app.innerHTML =
    '<h1>Root Words Quiz</h1>' +
    '<p class="subtitle">frail, fract, frag = break; shatter</p>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>' +
    '<div class="card results">' +
      '<div class="score-big">' + pct + '%</div>' +
      '<div class="score-label">' + score + ' out of ' + questions.length + ' correct</div>' +
      '<div class="message">' + msg + '</div>' +
      missedHTML +
      '<div class="btn-row">' +
        retryBtn +
        '<button class="btn-restart" id="restart">Play Again</button>' +
        '<button class="btn-home" id="home">Back to Menu</button>' +
      '</div>' +
    '</div>';

  document.getElementById("restart").addEventListener("click", function() {
    var pool = [];
    if (quizMode === "vocab" || quizMode === "all") {
      pool = pool.concat(VOCAB.map(function(v) { return { type: "vocab", word: v.word, def: v.def, explain: v.explain }; }));
    }
    if (quizMode === "reverse" || quizMode === "all") {
      pool = pool.concat(VOCAB.map(function(v) { return { type: "reverse", word: v.word, def: v.def, explain: v.explain }; }));
    }
    startQuiz(pool);
  });
  document.getElementById("home").addEventListener("click", showMenu);
  if (missed.length) {
    document.getElementById("retryMissed").addEventListener("click", function() { startQuiz([].concat(missed)); });
  }
}

/* ── FLASHCARDS ── */
var fcCards, fcIdx, fcGotIt, fcLearning, fcFlipped;

function startFlashcards(cards) {
  fcCards = shuffle(cards);
  fcIdx = 0;
  fcGotIt = [];
  fcLearning = [];
  fcFlipped = false;
  renderFlashcard();
}

function renderFlashcard() {
  var app = document.getElementById("app");
  if (fcIdx >= fcCards.length) { renderFcSummary(app); return; }

  var c = fcCards[fcIdx];
  fcFlipped = false;
  var remaining = fcCards.length - fcIdx;

  app.innerHTML =
    '<h1>Root Words Quiz</h1>' +
    '<p class="subtitle">Flashcards \u2014 Tap the card to flip</p>' +
    '<div class="fc-counter">' + (fcIdx + 1) + ' of ' + fcCards.length + ' \u00B7 ' + remaining + ' remaining</div>' +
    '<div class="fc-scene">' +
      '<div class="fc-card" id="fcCard">' +
        '<div class="fc-face fc-front">' +
          '<div class="fc-word">' + c.word + '</div>' +
          '<div class="fc-hint">tap to see definition</div>' +
        '</div>' +
        '<div class="fc-face fc-back">' +
          '<div class="fc-def">' + c.def + '</div>' +
          '<div class="fc-explain">' + c.explain + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="fc-grade" id="fcGrade" style="visibility:hidden;">' +
      '<button class="fc-got-it" id="fcGotItBtn">Got it</button>' +
      '<button class="fc-learning" id="fcLearningBtn">Still learning</button>' +
    '</div>' +
    '<div style="height:12px;"></div>' +
    '<div class="fc-nav">' +
      '<button id="fcPrev"' + (fcIdx === 0 ? ' disabled' : '') + '>Back</button>' +
      '<button id="fcSkip">Skip</button>' +
      '<button class="btn-home" id="fcHome" style="font-size:0.95rem;">Menu</button>' +
    '</div>';

  document.getElementById("fcCard").addEventListener("click", function() {
    fcFlipped = !fcFlipped;
    document.getElementById("fcCard").classList.toggle("flipped", fcFlipped);
    if (fcFlipped) document.getElementById("fcGrade").style.visibility = "visible";
  });

  document.getElementById("fcGotItBtn").addEventListener("click", function() {
    fcGotIt.push(fcCards[fcIdx]);
    fcIdx++;
    renderFlashcard();
  });
  document.getElementById("fcLearningBtn").addEventListener("click", function() {
    fcLearning.push(fcCards[fcIdx]);
    fcIdx++;
    renderFlashcard();
  });

  document.getElementById("fcPrev").addEventListener("click", function() {
    if (fcIdx > 0) {
      var lastGot = fcGotIt[fcGotIt.length - 1];
      var lastLearn = fcLearning[fcLearning.length - 1];
      var prev = fcCards[fcIdx - 1];
      if (lastGot === prev) fcGotIt.pop();
      else if (lastLearn === prev) fcLearning.pop();
      fcIdx--;
      renderFlashcard();
    }
  });
  document.getElementById("fcSkip").addEventListener("click", function() {
    fcIdx++;
    if (fcIdx >= fcCards.length) fcIdx = fcCards.length;
    renderFlashcard();
  });
  document.getElementById("fcHome").addEventListener("click", showMenu);
}

function renderFcSummary(app) {
  var total = fcGotIt.length + fcLearning.length;
  var allGood = fcLearning.length === 0;
  var msg = allGood
    ? "You know all the words! Try the quiz to test yourself."
    : "You\u2019ve got " + fcGotIt.length + " down. Let\u2019s keep working on the other " + fcLearning.length + ".";

  var stillHTML = "";
  if (fcLearning.length) {
    stillHTML = '<div class="fc-still"><h3>Still learning (' + fcLearning.length + ')</h3>' +
      fcLearning.map(function(c) {
        return '<div class="fc-still-item"><strong>' + c.word + '</strong> \u2014 <span>' + c.def + '</span></div>';
      }).join("") +
      '</div>';
  }

  var retryBtn = fcLearning.length
    ? '<button class="fc-learning" id="fcRetry" style="padding:12px 28px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;">Study "Still Learning" Again</button>' : "";
  var quizBtn = allGood
    ? '<button class="btn-restart" id="fcToQuiz">Take the Quiz</button>' : "";

  app.innerHTML =
    '<h1>Root Words Quiz</h1>' +
    '<p class="subtitle">Flashcard Review</p>' +
    '<div class="card fc-summary">' +
      '<div class="big-check">' + (allGood ? "&#x2705;" : "&#x1F4DA;") + '</div>' +
      '<div class="score-big" style="color:#667eea;">' + fcGotIt.length + '/' + total + '</div>' +
      '<div class="score-label" style="color:#718096;">words mastered</div>' +
      '<div class="fc-msg">' + msg + '</div>' +
      stillHTML +
      '<div class="btn-row">' +
        retryBtn +
        '<button class="btn-restart" id="fcAll">All Cards Again</button>' +
        quizBtn +
        '<button class="btn-home" id="fcMenuBtn">Back to Menu</button>' +
      '</div>' +
    '</div>';

  document.getElementById("fcAll").addEventListener("click", function() { startFlashcards(VOCAB); });
  document.getElementById("fcMenuBtn").addEventListener("click", showMenu);
  if (fcLearning.length) {
    document.getElementById("fcRetry").addEventListener("click", function() { startFlashcards(fcLearning); });
  }
  if (allGood) {
    document.getElementById("fcToQuiz").addEventListener("click", function() {
      quizMode = "vocab";
      startQuiz(VOCAB.map(function(v) { return { type: "vocab", word: v.word, def: v.def, explain: v.explain }; }));
    });
  }
}

/* ── START ── */
showMenu();
</script>
</body>
</html>
